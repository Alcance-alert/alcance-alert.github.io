<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcance Alert — Login</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="canonical" href="https://alcancealert.com/login.html">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --orange: #ff6b00;
      --red: #ff3b30;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .logo svg { width: 36px; height: 36px; }
    .logo-text { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .logo-text span { color: var(--orange); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 400px;
    }
    .card h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: var(--orange);
    }
    .btn-primary {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .divider span { font-size: 12px; color: var(--muted); }
    .btn-google {
      width: 100%;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .error {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-top: 12px;
      display: none;
    }
    .toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .toggle a {
      color: var(--orange);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="logo">
  <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#FF6B00" stroke-width="4"/>
    <polyline points="18,54 30,40 42,46 54,26 66,30" fill="none" stroke="#FF6B00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="54" cy="26" r="6" fill="#FF6B00"/>
  </svg>
  <div class="logo-text">ALCANCE <span>ALERT</span></div>
</div>

<div class="card">
  <h2 id="formTitle">Welcome back</h2>
  <p id="formSubtitle">Sign in to your account to continue</p>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="emailInput" placeholder="you@email.com" autocomplete="email">
  </div>
  <div class="input-group">
    <label>Password</label>
    <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-primary" id="authBtn" onclick="handleEmailAuth()">Sign In</button>

  <div class="error" id="errorMsg"></div>

  <div class="divider">
    <hr><span>or</span><hr>
  </div>

  <button class="btn-google" onclick="handleGoogleLogin()">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
      <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
      <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/>
      <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
    </svg>
    Continue with Google
  </button>

  <div class="toggle">
    <span id="toggleText">Don't have an account?</span>
    <a onclick="toggleMode()"> <span id="toggleLink">Sign Up</span></a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDA9SxSHUytY6sOUgzGZZxe4BP0fWtsDs8",
    authDomain: "alcance-alert.firebaseapp.com",
    projectId: "alcance-alert",
    storageBucket: "alcance-alert.firebasestorage.app",
    messagingSenderId: "1055773203578",
    appId: "1:1055773203578:web:7f2aec1ff5b19627b36fc3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let isSignUp = false;

  // Se já tiver logado, vai direto pro dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = '/dashboard.html';
    }
  });

  window.toggleMode = function() {
    isSignUp = !isSignUp;
    document.getElementById('formTitle').textContent = isSignUp ? 'Create account' : 'Welcome back';
    document.getElementById('formSubtitle').textContent = isSignUp ? 'Start monitoring your stocks today' : 'Sign in to your account to continue';
    document.getElementById('authBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('toggleText').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
    document.getElementById('toggleLink').textContent = isSignUp ? 'Sign In' : 'Sign Up';
    hideError();
  };

  window.handleEmailAuth = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const btn = document.getElementById('authBtn');

    if (!email || !password) { showError('Please enter email and password.'); return; }

    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;
    hideError();

    try {
      if (isSignUp) {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      window.location.href = '/dashboard.html';
    } catch (e) {
      btn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
      btn.disabled = false;
      showError(friendlyError(e.code));
    }
  };

  window.handleGoogleLogin = async function() {
    hideError();
    try {
      await signInWithPopup(auth, provider);
      window.location.href = '/dashboard.html';
    } catch (e) {
      showError(friendlyError(e.code));
    }
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  function friendlyError(code) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/popup-closed-by-user': 'Google sign-in was cancelled.',
      'auth/invalid-credential': 'Incorrect email or password.',
    };
    return msgs[code] || 'Something went wrong. Please try again.';
  }

  // Enter key submits form
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleEmailAuth();
  });
</script>
</body>
</html>
